# ─── MedCloud S3 + OCR Auto-Trigger Stack ─────────────────────────────────────
# Deploy: aws cloudformation deploy --template-file s3-ocr-stack.yml \
#           --stack-name medcloud-s3-ocr --capabilities CAPABILITY_NAMED_IAM \
#           --parameter-overrides LambdaFunctionArn=<arn> Environment=prod
#
# What this creates:
#   1. S3 bucket: medcloud-documents-us-prod
#      — versioning, AES-256 encryption, HIPAA-compliant lifecycle rules
#      — blocks all public access
#   2. S3 event notification → Lambda auto-trigger on upload (no polling needed)
#   3. IAM role for Textract to write results back
#   4. SNS topic for Textract async job completion notifications
# ─────────────────────────────────────────────────────────────────────────────

AWSTemplateFormatVersion: '2010-09-09'
Description: MedCloud Document Storage + OCR Auto-Trigger Infrastructure

Parameters:
  LambdaFunctionArn:
    Type: String
    Description: ARN of the medcloud-api Lambda function
  Environment:
    Type: String
    Default: prod
    AllowedValues: [prod, staging]

Resources:

  # ── S3 Document Bucket ────────────────────────────────────────────────────
  DocumentsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'medcloud-documents-us-${Environment}'
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          # HIPAA: 7-year document retention
          - Id: DocumentRetention
            Status: Enabled
            Transitions:
              # Move to IA after 90 days (cost savings)
              - TransitionInDays: 90
                StorageClass: STANDARD_IA
              # Move to Glacier after 1 year (archival)
              - TransitionInDays: 365
                StorageClass: GLACIER
            NoncurrentVersionExpiration:
              NoncurrentDays: 2555  # 7 years for non-current versions
          # Temp uploads: clean up incomplete multipart uploads
          - Id: CleanupIncompleteUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 1
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [GET, PUT, POST]
            AllowedOrigins:
              - 'https://medcloud.vercel.app'
              - 'https://med-cloud.vercel.app'
            ExposedHeaders: [ETag]
            MaxAge: 3000
      NotificationConfiguration:
        LambdaConfigurations:
          # Auto-trigger OCR on any new document upload
          - Event: 's3:ObjectCreated:*'
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: 'documents/'
            Function: !Ref LambdaFunctionArn
          # Also trigger on uploads/ subfolder
          - Event: 's3:ObjectCreated:*'
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: 'uploads/'
            Function: !Ref LambdaFunctionArn
      Tags:
        - Key: Project
          Value: MedCloud
        - Key: Environment
          Value: !Ref Environment
        - Key: HIPAA
          Value: 'true'
        - Key: DataClassification
          Value: PHI

  # ── Lambda Permission: S3 can invoke Lambda ───────────────────────────────
  LambdaS3Permission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LambdaFunctionArn
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceArn: !GetAtt DocumentsBucket.Arn

  # ── SNS Topic: Textract async job completion ──────────────────────────────
  TextractCompletionTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub 'medcloud-textract-completion-${Environment}'
      Subscription:
        - Protocol: lambda
          Endpoint: !Ref LambdaFunctionArn
      Tags:
        - Key: Project
          Value: MedCloud

  # ── Lambda Permission: SNS can invoke Lambda ──────────────────────────────
  LambdaSNSPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LambdaFunctionArn
      Action: lambda:InvokeFunction
      Principal: sns.amazonaws.com
      SourceArn: !Ref TextractCompletionTopic

  # ── IAM Role: Textract → S3 + SNS ────────────────────────────────────────
  TextractServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'MedCloudTextractRole-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: textract.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: TextractS3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                Resource: !Sub '${DocumentsBucket.Arn}/*'
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref TextractCompletionTopic

  # ── IAM Policy: Lambda → Textract + S3 (attach to Lambda execution role) ─
  LambdaTextractPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub 'MedCloudLambdaTextractPolicy-${Environment}'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - textract:StartDocumentAnalysis
              - textract:GetDocumentAnalysis
              - textract:AnalyzeDocument
              - textract:DetectDocumentText
            Resource: '*'
          - Effect: Allow
            Action:
              - s3:GetObject
              - s3:GetObjectVersion
              - s3:PutObject
            Resource:
              - !GetAtt DocumentsBucket.Arn
              - !Sub '${DocumentsBucket.Arn}/*'
          - Effect: Allow
            Action:
              - sns:Publish
            Resource: !Ref TextractCompletionTopic

Outputs:
  BucketName:
    Value: !Ref DocumentsBucket
    Description: S3 bucket name — set as S3_BUCKET env var in Lambda
  BucketArn:
    Value: !GetAtt DocumentsBucket.Arn
  TextractRoleArn:
    Value: !GetAtt TextractServiceRole.Arn
    Description: Set as TEXTRACT_ROLE_ARN env var in Lambda
  TextractSNSTopicArn:
    Value: !Ref TextractCompletionTopic
    Description: Set as TEXTRACT_SNS_ARN env var in Lambda
  LambdaPolicyArn:
    Value: !Ref LambdaTextractPolicy
    Description: Attach this managed policy to the Lambda execution role
